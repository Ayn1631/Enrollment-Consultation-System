version: "3.9"

services:
  api-gateway:
    build:
      context: ./backend
    container_name: admissions-api-gateway
    env_file:
      - ./backend/.env
    environment:
      - USE_MOCK_GENERATION=false
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/app/docs:ro
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: admissions-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

  postgres:
    image: pgvector/pgvector:pg16
    container_name: admissions-postgres
    environment:
      POSTGRES_USER: admissions
      POSTGRES_PASSWORD: admissions
      POSTGRES_DB: admissions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: admissions-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:

